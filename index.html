<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 필승 공부 성향 테스트</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: var(--card-bg); width: 100%; max-width: 450px; min-height: 550px; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; }
        
        .page { display: none; }
        .page.active { display: flex; flex-direction: column; height: 100%; justify-content: space-between; }
        
        /* 메인 페이지 */
        .intro-page { text-align: center; }
        .intro-page h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 15px; color: var(--primary-color); line-height: 1.4; }
        .intro-page p { color: var(--text-muted); margin-bottom: 40px; font-size: 1rem; line-height: 1.6; }
        
        /* 공통 버튼 */
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 16px 20px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; width: 100%; text-align: center; box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2); }
        .btn:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        
        /* 질문 페이지 */
        .progress-container { width: 100%; background: #e5e7eb; height: 8px; border-radius: 4px; margin-bottom: 30px; position: relative; }
        .progress-bar { background: var(--primary-color); height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s ease; }
        .question-box { font-size: 1.3rem; font-weight: 700; line-height: 1.5; margin-bottom: 40px; min-height: 80px; text-align: center; }
        .options { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .option-btn { background: #f3f4f6; border: 2px solid transparent; padding: 18px 20px; border-radius: 12px; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.2s; font-weight: 500; color: var(--text-main); line-height: 1.4; }
        .option-btn:hover { border-color: var(--primary-color); background: #f5f3ff; color: var(--primary-color); }
        
        /* 결과 페이지 */
        .result-page { text-align: center; }
        .result-type { font-size: 0.9rem; font-weight: bold; color: var(--primary-color); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .result-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; word-break: keep-all; }
        .result-desc { text-align: left; background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.7; color: var(--text-muted); }
        .result-desc ul { margin-top: 10px; padding-left: 20px; }
        .result-desc li { margin-bottom: 6px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 메인 인트로 페이지 -->
    <div id="introPage" class="page active intro-page">
        <div></div>
        <div>
            <h1>나에게 딱 맞는<br>필승 공부 성향 테스트</h1>
            <p>12개의 간단한 질문을 통해 나의 완벽한 학습 스타일과 최적의 공부 환경을 찾아보세요!</p>
        </div>
        <button class="btn" onclick="startQuiz()">테스트 시작하기</button>
    </div>

    <!-- 2. 퀴즈 문항 페이지 -->
    <div id="quizPage" class="page">
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="questionBox" class="question-box">질문이 여기에 표시됩니다.</div>
        <div class="options">
            <button id="optA" class="option-btn" onclick="selectOption('A')">선택지 A</button>
            <button id="optB" class="option-btn" onclick="selectOption('B')">선택지 B</button>
        </div>
    </div>

    <!-- 3. 결과 페이지 -->
    <div id="resultPage" class="page result-page">
        <div>
            <div id="resultType" class="result-type">TYPE</div>
            <div id="resultTitle" class="result-title">결과 타이틀</div>
            <div id="resultDesc" class="result-desc">결과 상세 설명</div>
        </div>
        <button class="btn" onclick="restartQuiz()">다시 테스트하기</button>
    </div>
</div>

<script>
    // 12개 질문 데이터 세팅 (타입 매핑)
    const questions = [
        { q: "시험 기간이 다가왔을 때 내가 선호하는 공부 장소는?", a: "독서실 1인실이나 방구석처럼 사방이 막힌 곳", b: "탁 트인 카페나 적당한 소음이 있는 스터디 카페", type: "energy" }, // A: Solo / B: Study
        { q: "새로운 개념을 배울 때 나는 어떤 태도를 취하나요?", a: "왜 이런 공식이 나왔는지 원리를 철저히 이해해야 진도가 나간다", b: "일단 공식과 핵심을 외우고 문제를 풀면서 감을 잡는다", type: "info" }, // A: Why / B: What
        { q: "공부를 시작하기 전 나의 계획표 상태는?", a: "시간 단위, 분량 단위로 꼼꼼하게 계획을 짜둔다", b: "그날그날 기분이나 급한 과목 위주로 유연하게 결정한다", type: "plan" }, // A: Plan / B: Flex
        { q: "인터넷 강의를 들을 때 내가 더 집중 잘되는 방식은?", a: "자료 화면, 자막, 교재 텍스트를 눈으로 꼼꼼히 읽을 때", b: "강사님의 말소리, 나긋나긋하거나 카리스마 있는 목소리에 집중할 때", type: "stim" }, // A: Visual / B: Audio
        
        { q: "친구들과 함께 모여서 하는 조별 과제나 스터디는?", a: "시간 낭비가 많고 신경 쓰여서 혼자 하는 게 훨씬 편하다", b: "서로 질문하고 자극도 받으면서 같이 할 때 효율이 오른다", type: "energy" },
        { q: "역사나 사회 과목을 공부할 때 더 잘 외워지는 방식은?", a: "전체적인 시대 흐름과 사건의 인과관계를 스토리로 이해한다", b: "시험에 나올 만한 핵심 키워드와 단어 요약집을 반복해서 암기한다", type: "info" },
        { q: "예상치 못한 스케줄이 생겨 오늘 계획했던 공부를 못했다면?", a: "계획이 틀어져서 스트레스를 받고 다음 계획을 수정하느라 분주하다", b: "그럴 수도 있지! 내일 조금 더 하거나 주말에 몰아서 하면 된다", type: "plan" },
        { q: "복습을 할 때 나에게 더 효과적인 방법은?", a: "노트 정리본을 예쁘게 눈으로 보며 회독수를 늘린다", b: "자신에게 말하듯이 입으로 소리 내어 설명하며 공부한다", type: "stim" },
        
        { q: "주변 친구들이 열심히 공부하는 모습을 보면 드는 생각은?", a: "남은 남, 나는 나! 내 페이스대로 공부하는 게 중요하지", b: "악, 나도 질 수 없지! 눈에 불을 켜고 책을 펼치게 된다", type: "energy" },
        { q: "수학 문제를 풀다가 막히는 어려운 문제를 만났을 때?", a: "답지를 보지 않고 한두 시간이라도 붙잡아 끝까지 풀어내려 노력한다", b: "10~15분 고민해 보고 안 되면 빠르게 답지의 풀이 과정을 암기한다", type: "info" },
        { q: "시험 공부는 언제부터 본격적으로 발동이 걸리나요?", a: "2~3주 전부터 매일 규칙적인 분량을 나누어 차근차근", b: "시험 일주일 전, 혹은 벼락치기의 신이 강림하는 시험 직전 2~3일", type: "plan" },
        { q: "학원이나 학교 수업을 고를 때 내가 가장 중요하게 보는 것은?", a: "칠판 판서가 깔끔하고 시각 자료(PPT, 그림)를 잘 활용하는지", b: "선생님의 말하기 스타일이 귀에 쏙쏙 박히고 재미있는지", type: "stim" }
    ];

    // 결과 매칭 데이터
    const results = {
        "S-W-P-V": { title: "철두철미한 탑클래스 독고다이", desc: "혼자 있을 때 최고의 효율을 내며, 원리 이해와 철저한 계획을 바탕으로 시각 자료를 활용할 때 무적 성향을 보입니다.<br><ul><li><b>추천 환경:</b> 커튼형 1인 독서실, 집 방구석</li><li><b>꿀팁:</b> 타인과의 스터디는 스트레스가 될 수 있으니 독학 위주로 세팅하되, 지나친 계획 수정으로 시간을 낭비하지 마세요!</li></ul>" },
        "S-W-P-A": { title: "원리 중심의 프로 인강러", desc: "혼자 조용히 깊게 파고들며 공부하는 것을 즐깁니다. 귀로 듣는 강의 효율이 좋아 명쾌한 일타강사의 수업을 독학으로 마스터하는 스타일입니다.<br><ul><li><b>추천 환경:</b> 조용한 방안에서 고성능 헤드폰 장착</li><li><b>꿀팁:</b> 배속을 너무 높여 들으면 원리 이해를 놓칠 수 있으니 적당한 속도로 필기하며 들으세요.</li></ul>" },
        "S-W-F-V": { title: "자유로운 영혼의 학구파", desc: "개념 이해는 완벽하게 하고 싶지만, 빡빡한 규칙이나 계획은 딱 질색인 타입입니다. 내 마음에 확 와닿는 책이나 시각 자료를 볼 때 엄청난 집중력을 발휘합니다.<br><ul><li><b>추천 환경:</b> 오늘은 집, 내일은 도서관 등 장소에 변화를 주는 독학</li><li><b>꿀팁:</b> 벼락치기 성향이 강하므로 마감 직전에 원리 파악하다가 시험이 끝날 수 있으니 상한선 타임라인은 설정해 두세요.</li></ul>" },
        "S-W-F-A": { title: "지식 탐구형 방구석 스토리텔러", desc: "말소리를 들으며 원리를 이해할 때 희열을 느끼는 타입입니다. 계획에 얽매이지 않고 자신이 꽂히는 과목의 인강을 몰아서 정주행하는 경향이 있습니다.<br><ul><li><b>추천 환경:</b> 혼자 중얼거릴 수 있는 내 방 책상</li><li><b>꿀팁:</b> 암기 과목은 말하면서 외우는 백지 복습법이 최고의 효율을 냅니다.</li></ul>" },
        "S-O-P-V": { title: "걸어 다니는 꼼꼼한 요약 노트", desc: "이해보다는 완벽한 암기와 철저한 계획성으로 시험을 정복하는 정석파입니다. 시각적인 정리(노트 필기, 색펜 활용)를 기가 막히게 잘합니다.<br><ul><li><b>추천 환경:</b> 시야가 확보되면서도 독립된 독서실</li><li><b>꿀팁:</b> 너무 완벽한 노트 필기 자체에 집착하느라 진도를 못 나가는 우를 범하지 마세요!</li></ul>" },
        "S-O-P-A": { title: "루틴을 지키는 암기 마스터", desc: "정해진 계획표대로 하루 분량을 칼같이 지키며, 핵심 내용을 소리 내어 외우거나 오디오 강의를 반복 청취하며 머리에 집어넣는 고도의 끈기 소유자입니다.<br><ul><li><b>추천 환경:</b> 규칙적인 백색소음이 있는 관리형 독서실</li><li><b>꿀팁:</b> 단순 암기에 치우쳐 고난도 응용문제를 놓칠 수 있으니 유형별 문제 풀이를 병행하세요.</li></ul>" },
        "S-O-F-V": { title: "직관적 몰입형 벼락치기 고수", desc: "평소에는 조용히 시각 자료만 훑어보다가, 시험 직전 엄청난 암기력으로 교재를 통째로 뇌에 스캔해 버리는 무서운 집중력의 소유자입니다.<br><ul><li><b>추천 환경:</b> 익숙하고 조용한 나만의 공간</li><li><b>꿀팁:</b> 벼락치기는 단기 기억에 불과하니 중요 시험은 최소 일주일 전 발동을 걸어주세요.</li></ul>" },
        "S-O-F-A": { title: "청각 극대화형 벼락치기 파이터", desc: "혼자 편안한 상태에서 귀로 들은 내용이나 직전에 외운 핵심 단어들을 시험지에 그대로 쏟아붓는 스타일입니다. 긴장하면 오히려 집중력이 오릅니다.<br><ul><li><b>추천 환경:</b> 침대 위나 조용한 방안</li><li><b>꿀팁:</b> 시험 직전 친구가 물어보는 말에 페이스를 잃기 쉬우니 시험 당일엔 귀를 닫고 본인 정리본에 집중하세요.</li></ul>" },
        
        "T-W-P-V": { title: "엘리트 스터디 그룹 리더", desc: "친구들과 함께 공부하거나 경쟁적인 분위기에서 자극을 받으며, 계획적으로 원리를 파고드는 완벽주의 러너입니다. 깔끔한 판서와 시각 자료를 선호합니다.<br><ul><li><b>추천 환경:</b> 열정적인 사람들이 모인 오픈형 스카/그룹 스터디</li><li><b>꿀팁:</b> 조원들의 무임승차나 진도 지연에 스트레스를 받을 수 있으니 개인 공부 시간은 철저히 사수하세요.</li></ul>" },
        "T-W-P-A": { title: "소통형 집단지성 사운드 마스터", desc: "친구들과 질문을 주고받거나 스터디 팀원의 설명을 귀로 들으면서 개념 원리를 완벽하게 장착해 나가는 계획파 스마트 러너입니다.<br><ul><li><b>추천 환경:</b> 대화 및 토론이 가능한 스터디룸</li><li><b>꿀팁:</b> 말이 통하는 친구와 잡담으로 흘러갈 확률이 80%입니다. 타이머를 켜두고 공부하세요.</li></ul>" },
        "T-W-F-V": { title: "트렌디한 카리스마 분위기 메이커", desc: "지루하고 딱딱한 공간을 싫어해 매번 새로운 핫플레이스 카페나 뷰가 좋은 스카를 찾아다닙니다. 타인의 시선을 즐기며 개념을 시각적으로 빠르게 스캔합니다.<br><ul><li><b>추천 환경:</b> 힙하고 넓은 대형 카페, 대학교 도서관</li><li><b>꿀팁:</b> 분위기에 취해 책 구경만 하다 올 수 있으니 그날 끝낼 목표 분량 한 가지만은 꼭 정해두고 가세요.</li></ul>" },
        "T-W-F-A": { title: "토론 중심의 자유로운 올빼미", desc: "계획성보다는 그날 만나는 사람과 환경의 오디오 자극(대화, 인강)을 즐기며, 토론하고 질문하는 과정에서 어려운 개념을 쉽게 이해해 버리는 재능파입니다.<br><ul><li><b>추천 환경:</b> 자유로운 분위기의 카페, 화상 공부방(줌터디)</li><li><b>꿀팁:</b> 듣고 말하는 재미에 취해 스스로 연필을 쥐고 문제를 직접 푸는 시간을 놓치면 안 됩니다.</li></ul>" },
        "T-O-P-V": { title: "경쟁을 즐기는 페이스메이커", desc: "남들에게 뒤처지지 않겠다는 계획적인 독기를 품고 눈에 보이는 성과와 등수를 보며 에너지를 얻습니다. 요약집과 암기 카드를 시각적으로 마스터합니다.<br><ul><li><b>추천 환경:</b> 실시간 랭킹이 보이는 관리형 스카나 학원 맨 앞자리</li><li><b>꿀팁:</b> 타인과의 비교로 번아웃이 쉽게 올 수 있으니 일주일에 하루는 온전히 자신만을 위해 쉬어주세요.</li></ul>" },
        "T-O-P-A": { title: "질의응답형 앵무새 러너", desc: "철저한 계획 하에 스터디원들과 암기 과목 퀴즈를 내고 맞추는 배틀을 할 때 암기력이 우주를 뚫고 올라갑니다. 귀로 듣고 입으로 뱉는 오디오 자극이 생명입니다.<br><ul><li><b>추천 환경:</b> 말문이 트이는 암기 테스트 전용 스터디룸</li><li><b>꿀팁:</b> 퀴즈 준비에 너무 많은 시간을 쏟지 않도록 기출문제 기반의 정해진 범위만 컴팩트하게 테스트하세요.</li></ul>" },
        "T-O-F-V": { title: "위기에 강한 카페 카공족", desc: "평소엔 설렁설렁 카페에서 친구들과 수다 떨며 책을 보는 듯하지만, 시험 마감이 임박하면 주변의 시선과 긴장감을 흡수해 시각적 암기 폭발력을 보여주는 벼락치기 강자입니다.<br><ul><li><b>추천 환경:</b> 적당한 백색소음과 시야가 트인 창가 자리 카페</li><li><b>꿀팁:</b> 스마트폰 알림에 쉽게 눈이 가기 때문에 집중 몰입 시간 동안에는 폰을 가방 깊숙이 넣어두세요.</li></ul>" },
        "T-O-F-A": { title: "오디오 소음형 벼락치기 천재", desc: "잔잔한 음악이 나오거나 주변 사람들의 말소리가 들리는 역동적인 공간에서, 시험 직전 귀에 꽂힌 강사의 핵심 암기 팁들을 스펀지처럼 흡수해 점수를 따내는 타입입니다.<br><ul><li><b>추천 환경:</b> 음악이 흐르는 카페, 라운지형 스터디 공간</li><li><b>꿀팁:</b> 소음이 너무 격해지면 정신줄을 놓칠 수 있으니 집중이 흐려질 땐 귀마개를 상시 준비하세요.</li></ul>" }
    };

    let currentIdx = 0;
    // 점수 누적용 스코어 보드
    let scores = { energy: 0, info: 0, plan: 0, stim: 0 };

    function startQuiz() {
        document.getElementById("introPage").classList.remove("active");
        document.getElementById("quizPage").classList.add("active");
        currentIdx = 0;
        scores = { energy: 0, info: 0, plan: 0, stim: 0 };
        showQuestion();
    }

    function showQuestion() {
        if (currentIdx < questions.length) {
            // 프로그레스 바 계산
            const progress = (currentIdx / questions.length) * 100;
            document.getElementById("progressBar").style.width = progress + "%";
            
            // 질문 및 선택지 바인딩
            const currentQ = questions[currentIdx];
            document.getElementById("questionBox").innerText = `${currentIdx + 1}. ${currentQ.q}`;
            document.getElementById("optA").innerText = currentQ.a;
            document.getElementById("optB").innerText = currentQ.b;
        } else {
            showResult();
        }
    }

    function selectOption(choice) {
        const currentQ = questions[currentIdx];
        // A를 선택하면 +1점, B를 선택하면 0점 (점수로 이분법 판단)
        if (choice === 'A') {
            scores[currentQ.type] += 1;
        }
        
        currentIdx++;
        showQuestion();
    }

    function showResult() {
        document.getElementById("quizPage").classList.remove("active");
        document.getElementById("resultPage").classList.add("active");

        // 3문항 중 과반수(2개 이상)가 A인지 여부로 코드 조합 생성
        // energy: A(Solo=S), B(Study=T)
        // info: A(Why=W), B(What=O)
        // plan: A(Plan=P), B(Flex=F)
        // stim: A(Visual=V), B(Audio=A)
        const eCode = scores.energy >= 2 ? "S" : "T";
        const iCode = scores.info >= 2 ? "W" : "O";
        const pCode = scores.plan >= 2 ? "P" : "F";
        const sCode = scores.stim >= 2 ? "V" : "A";

        const finalCode = `${eCode}-${iCode}-${pCode}-${sCode}`;
        const resultData = results[finalCode] || { title: "성실한 노력파 학생", desc: "균형 잡힌 복합적인 성향을 가지고 있습니다. 상황에 맞는 유연한 공부법을 적용해보세요!" };

        document.getElementById("resultType").innerText = `나의 성향 코드 : ${finalCode}`;
        document.getElementById("resultTitle").innerText = resultData.title;
        document.getElementById("resultDesc").innerHTML = resultData.desc;
    }

    function restartQuiz() {
        document.getElementById("resultPage").classList.remove("active");
        document.getElementById("introPage").classList.add("active");
    }
</script>

</body>
</html>
